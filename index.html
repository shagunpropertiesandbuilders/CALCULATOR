<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Calculator</title>
    <style>
        /* --- CSS STYLES --- */
        
        /* 1. Reset and Basic Setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #222; /* Dark background */
        }

        /* 2. Calculator Container */
        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 350px; /* Limits width on desktop */
        }

        /* 3. Display Screen */
        #display {
            width: 100%;
            height: 80px;
            background-color: #444;
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 2.5rem;
            text-align: right;
            padding: 10px;
            margin-bottom: 20px;
            outline: none;
        }

        /* 4. Button Grid Layout */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr); /* 4 columns */
            gap: 10px;
        }

        /* 5. Button Styling */
        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: #555;
            color: white;
            transition: background-color 0.2s, transform 0.1s;
        }

        button:hover {
            background-color: #666;
        }

        button:active {
            transform: scale(0.95);
        }

        /* Specific Button Colors */
        .operator {
            background-color: #ff9f43;
            color: #222;
            font-weight: bold;
        }
        .operator:hover {
            background-color: #ffb063;
        }

        .equal-sign {
            background-color: #2ecc71;
            grid-column: span 2; /* Make the = button wider */
            font-weight: bold;
        }
        .equal-sign:hover {
            background-color: #4cd185;
        }

        .clear {
            background-color: #e74c3c;
        }
        .clear:hover {
            background-color: #ff6b5b;
        }

        /* 6. Responsive Adjustments */
        @media (max-width: 400px) {
            .calculator {
                width: 95%; /* Take up more space on small phones */
                padding: 15px;
            }
            
            button {
                padding: 15px; /* Smaller buttons on mobile */
                font-size: 1rem;
            }

            #display {
                font-size: 2rem;
                height: 60px;
            }
        }
    </style>
</head>
<body>

    <!-- HTML STRUCTURE -->
    <div class="calculator">
        <input type="text" id="display" readonly>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button onclick="deleteLast()">DEL</button>
            <button class="operator" onclick="appendValue('/')">/</button>
            <button class="operator" onclick="appendValue('*')">×</button>
            
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="operator" onclick="appendValue('-')">-</button>
            
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="operator" onclick="appendValue('+')">+</button>
            
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button onclick="appendValue('.')">.</button>
            
            <button onclick="appendValue('0')">0</button>
            <button class="equal-sign" onclick="calculateResult()">=</button>
        </div>
    </div>

    <!-- JAVASCRIPT LOGIC -->
    <script>
        const display = document.getElementById('display');

        // Function to add numbers/operators to the display
        function appendValue(input) {
            display.value += input;
        }

        // Function to clear the entire display
        function clearDisplay() {
            display.value = "";
        }

        // Function to delete the last character
        function deleteLast() {
            display.value = display.value.toString().slice(0, -1);
        }

        // Function to calculate the result
        function calculateResult() {
            try {
                // eval() evaluates the string as math code (e.g., "2+2")
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
                setTimeout(() => clearDisplay(), 1500); // Clear error after 1.5s
            }
        }

        // Add Keyboard Support
        document.addEventListener('keydown', function(event) {
            const key = event.key;
            
            // Allow numbers and operators
            if (/[0-9.+\-*/]/.test(key)) {
                appendValue(key);
            }
            // Enter key for equals
            else if (key === 'Enter') {
                calculateResult();
            }
            // Backspace for delete
            else if (key === 'Backspace') {
                deleteLast();
            }
            // Escape for clear
            else if (key === 'Escape') {
                clearDisplay();
            }
        });
    </script>
</body>
</html>
